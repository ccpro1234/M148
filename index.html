<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Formula – Premium Analysis</title>

<style>
:root{
 --bg:#020617;--card:#0f172a;--border:rgba(255,255,255,.12);
 --text:#f8fafc;--muted:#94a3b8;
 --player:#3b82f6;--banker:#ef4444;--tie:#16a34a;
 --win:#22c55e;--lose:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,system-ui}
.page{max-width:1280px;margin:auto;padding:18px;display:grid;grid-template-columns:1fr 380px;gap:18px}
@media(max-width:960px){.page{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,#0f172a,#020617);border-radius:26px;padding:18px;border:1px solid var(--border)}
h1{text-align:center;margin:6px 0}
h2{font-size:.85rem;color:var(--muted);margin-bottom:10px}

.counter{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.counter div{background:#020617;border:1px solid var(--border);border-radius:18px;padding:10px;text-align:center;font-weight:900}
.counter .p{color:var(--player)} .counter .b{color:var(--banker)} .counter .t{color:var(--tie)}

.bead-wrap{background:#020617;border-radius:18px;padding:6px;border:1px solid var(--border)}
.bead{display:grid;grid-auto-flow:column;grid-template-rows:repeat(6,22px);gap:2px;width:fit-content}
.cell{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
.cell.P{background:var(--player)} .cell.B{background:var(--banker)} .cell.T{background:var(--tie)}

.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.controls.bottom{grid-template-columns:repeat(2,1fr)}
.btn{padding:14px;border:none;border-radius:18px;font-weight:900;color:#fff;cursor:pointer}
.btn-p{background:var(--player)} .btn-b{background:var(--banker)} .btn-t{background:var(--tie)}
.btn-u{background:#475569} .btn-c{background:#7f1d1d}

.strategy{border-bottom:1px dashed var(--border);padding:14px 0;display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center}
.icons{display:grid;grid-template-columns:repeat(20,18px);gap:6px}
.dna{width:18px;height:18px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.dna.w{background:#22c55e} .dna.l{background:#ef4444}

.pick{min-width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}
.pick.P{background:var(--player)} .pick.B{background:var(--banker)} .pick.NA{background:#475569}

@keyframes blinkPick{0%,100%{transform:scale(1.8)}50%{transform:scale(1.4)}}
.analysis-pick{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:20px;background:#020617;border:1px solid var(--border);margin-bottom:12px}
.blink{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;animation:blinkPick .9s infinite}
.blink.P{background:var(--player)} .blink.B{background:var(--banker)}

table{width:100%;border-collapse:collapse;font-size:.8rem}
th,td{padding:6px;text-align:center;border-bottom:1px solid var(--border)}
.w{color:var(--win)} .l{color:var(--lose)}
</style>
</head>

<body>
  <div id="loginBox" style="
position:fixed;
inset:0;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-family:Segoe UI;
">

<div style="
width:320px;
background:#0f172a;
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
text-align:center;
">
<h2 style="margin-bottom:20px">LOGIN</h2>

<input id="user" placeholder="Username"
style="width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:none">

<div style="position:relative">

<input id="pass" type="password" placeholder="Password"
style="
width:100%;
padding:10px 40px 10px 10px;
margin-bottom:16px;
border-radius:10px;
border:none;
">

<span onclick="togglePass()" style="
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
color:#000;
user-select:none;
">
👁
</span>

</div>

<button onclick="login()" style="
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
font-weight:700;
cursor:pointer;
">
เข้าสู่ระบบ
</button>

<div id="loginErr" style="margin-top:10px;color:#ef4444;font-size:12px"></div>

</div>
</div>

<div class="page" id="app" style="display:none">
<div>
<h1>Genius Formula</h1>
<div id="expireText" style="
text-align:center;
font-size:12px;
color:#94a3b8;
margin-bottom:10px;
"></div>

<div class="card">
<div class="counter">
 <div class="p">P: <span id="cP">0</span></div>
 <div class="b">B: <span id="cB">0</span></div>
 <div class="t">T: <span id="cT">0</span></div>
 <div>TOTAL: <span id="cAll">0</span></div>
</div>

<h2>Bead Road</h2>
<div class="bead-wrap"><div id="beadRoad" class="bead"></div></div>

<h2>บันทึกผล</h2>
<div class="controls">
 <button class="btn btn-p" onclick="addResult('P')">P</button>
 <button class="btn btn-b" onclick="addResult('B')">B</button>
 <button class="btn btn-t" onclick="addResult('T')">T</button>
</div>
<div class="controls bottom">
 <button class="btn btn-u" onclick="undo()">Undo</button>
 <button class="btn btn-c" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="card">
<h2>กลยุทธ์ & DNA (10 สาย)</h2>
<div id="strategyList"></div>
</div>
</div>

<div>
<div class="card">
<h2 style="text-align:center">ANALYSIS HISTORY</h2>

<div class="analysis-pick">
 <div>
  สายที่ใช้วิเคราะห์<br>
  <strong id="analysisName">-</strong><br>
  <small>ความแม่นยำ <span id="analysisPct">0</span>%</small>
 </div>
 <div id="analysisBlink"></div>
</div>

<table>
<thead><tr><th>ผล</th><th>W/L</th><th>ไม้</th></tr></thead>
<tbody id="historyBody"></tbody>
</table>
</div>
</div>
</div>



<script>

  const expireDate = new Date("2026-03-13T23:59:59");
// เพิ่มตรงนี้
let loginState = false;

// ตรวจสอบหมดอายุทันทีเมื่อเปิดเว็บ
window.onload = function(){

 const now = new Date();
 const expireText = document.getElementById("expireText");

 // ข้อความวันหมดอายุ (ภาษาไทย)
 const d = "13 มีนาคม พ.ศ. 2569";

 if(expireText){
  expireText.innerHTML = "วันหมดอายุโปรแกรม : " + d;
 }

 // เช็ควันหมดอายุจริง
 if(now > expireDate){
  document.body.innerHTML =
  "<h1 style='color:red;text-align:center;margin-top:100px'>โปรแกรมหมดอายุแล้ว</h1>";
 }

}
async function login(){

  const userInput = document.getElementById("user");
  const passInput = document.getElementById("pass");

  const loginBoxEl = document.getElementById("loginBox");
  const appEl = document.getElementById("app");
  const loginErrEl = document.getElementById("loginErr");

  loginErrEl.textContent="กำลังตรวจสอบ...";

  try{

   const res = await fetch(
 "https://morning-block-55bb.havanalanna.workers.dev/?user="
 +encodeURIComponent(userInput.value)+
 "&pass="+encodeURIComponent(passInput.value)
);

const data = await res.json();

if(data.status === "ok"){

  // แสดงแอป
  loginBoxEl.style.display = "none";
  appEl.style.display = "grid";   // ต้องเป็น grid เพื่อให้ layout 2 column ทำงาน

  updateUI();

  /* 🔒 ตรวจ License ทุก 30 วินาที */
  const user = userInput.value;
  const pass = passInput.value;

  setInterval(async ()=>{

    try{

      const r = await fetch(
       "https://morning-block-55bb.havanalanna.workers.dev/?user="
       +encodeURIComponent(user)+
       "&pass="+encodeURIComponent(pass)
      );

      const j = await r.json();

      if(j.status !== "ok"){
        alert("⛔ License ถูกปิดใช้งาน");
        location.reload();
      }

    }catch(e){
      console.log("License check error");
    }
   },30000);

    }else{

      loginErrEl.textContent="User หรือ Password ไม่ถูกต้อง";

    }

  }catch(e){

    loginErrEl.textContent="ไม่สามารถเชื่อมต่อ License Server";

  }

}

let results=[],history=[],step=1;

const strategies=[
 {name:"Pressure Pullback (ดึงกลับจากแรงกด)",logic:h=>h.length>=3&&h.at(-3)===h.at(-2)&&h.at(-1)!==h.at(-2)?(h.at(-1)==='P'?'B':'P'):'NA'},
 {name:"Cut (ตัดเค้า)",logic:h=>h.at(-1)==='P'?'B':h.at(-1)==='B'?'P':'NA'},
 {name:"Early Majority Snap (เสียงข้างมากเร็ว)",logic:h=>{let l=h.slice(-3);return l.filter(x=>x==='P').length===2?'P':l.filter(x=>x==='B').length===2?'B':'NA'}},
 {name:"Balance Drift Lock (ถ่วงสมดุล)",logic:h=>{let f=h.slice(-5).reduce((a,x)=>a+(x==='P'?1:-1),0);return f>0?'B':f<0?'P':'NA'}},
 {name:"Fake Break Counter (หลอกแล้วสวน)",logic:h=>h.length>=2&&h.at(-1)!==h.at(-2)?(h.at(-1)==='P'?'B':'P'):'NA'},
 {name:"Mirror-4 (ย้อนหลัง 4)",logic:h=>h.length>=4?h[h.length-4]:'NA'},
 {name:"Majority (ข้างมาก)",logic:h=>{let p=h.filter(x=>x==='P').length,b=h.filter(x=>x==='B').length;return p>b?'P':b>p?'B':'NA'}},
 {name:"Follow (ตามเค้า)",logic:h=>h.at(-1)||'NA'},
 {name:"Last-2 Majority (ซ้ำ 2 ล่าสุด)",logic:h=>h.length>=2&&h.at(-1)===h.at(-2)?h.at(-1):'NA'},
 {name:"Acceleration Trap (กับดักความเร็ว)",logic:h=>h.length>=3&&h.at(-3)===h.at(-1)?(h.at(-1)==='P'?'B':'P'):'NA'}
];

function calcHistory(s){
 let arr=[];
 for(let i=1;i<results.length;i++){
  let p=s.logic(results.slice(0,i));
  if(p!=='NA') arr.push(p===results[i]?'w':'l');
 }
 return arr.slice(-20);
}
function calc(s){
 let wl=calcHistory(s);
 let win=wl.filter(x=>x==='w').length;
 return{pct:wl.length?Math.round(win/wl.length*100):0,next:s.logic(results),wl};
}

function addResult(v){

 const ranked=strategies
  .map(s=>({s,data:calc(s)}))
  .sort((a,b)=>b.data.pct-a.data.pct);

 let use=null;

 for(let i=0;i<ranked.length;i++){
  if(ranked[i].data.next!=='NA'){
   use=ranked[i];
   break;
  }
 }

 // คำนวณ win ก่อนเพิ่มผล
 if(use && v!=='T'){
  const win = use.data.next === v;
  history.push({r:v,w:win,step});
  step = win ? 1 : step+1;
 }

 results.push(v);

 updateUI();
}

function undo(){results.pop();history.pop();step=1;updateUI()}
function clearAll(){results=[];history=[];step=1;updateUI()}

function updateUI(){
 cP.textContent=results.filter(x=>x==='P').length;
 cB.textContent=results.filter(x=>x==='B').length;
 cT.textContent=results.filter(x=>x==='T').length;
 cAll.textContent=results.length;

 beadRoad.innerHTML=results.map(r=>`<div class="cell ${r}">${r}</div>`).join("");

 const ranked=strategies.map(s=>({s,data:calc(s)}))
   .sort((a,b)=>b.data.pct-a.data.pct);

 strategyList.innerHTML=ranked.map(x=>`
 <div class="strategy">
  <div><strong>${x.s.name}</strong>
   <div class="icons">${x.data.wl.map(v=>`<div class="dna ${v}">${v==='w'?'✓':'✕'}</div>`).join("")}</div>
  </div>
  <div>${x.data.pct}%</div>
  <div class="pick ${x.data.next}">${x.data.next}</div>
 </div>`).join("");

let use=null;

for(let i=0;i<ranked.length;i++){
 if(ranked[i].data.next!=='NA'){
  use=ranked[i];
  break;
 }
}

if(use){
 analysisName.textContent=use.s.name;
 analysisPct.textContent=use.data.pct;

 analysisBlink.innerHTML=
  `<div class="blink ${use.data.next}">
    ${use.data.next}
  </div>`;
}else{
 analysisName.textContent="-";
 analysisPct.textContent="0";
 analysisBlink.innerHTML="";
}

 historyBody.innerHTML=history.map(h=>`
 <tr><td>${h.r}</td><td class="${h.w?'w':'l'}">${h.w?'W':'L'}</td><td>ไม้ ${h.step}</td></tr>`).join("");
}

function togglePass(){

 const pass = document.getElementById("pass");
 const eye = event.target;

 if(pass.type === "password"){
   pass.type = "text";
   eye.textContent = "🙈"; // เปลี่ยนไอคอนตอนเปิด
 }else{
   pass.type = "password";
   eye.textContent = "👁"; // ไอคอนตอนปิด
 }

}

</script>
</body>
</html>
